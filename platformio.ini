[platformio]
src_dir = src

[env:uno]
platform = atmelavr
board = uno
framework = arduino
lib_deps =
  adafruit/Adafruit SSD1306@^2.5.16

[env:nano3]
platform = lgt8f
board = LGT8F328P
framework = arduino
board_build.f_cpu = 16000000L
board_build.clock_source = 1
lib_deps =
  adafruit/Adafruit SSD1306@^2.5.16
